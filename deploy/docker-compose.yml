services:
  # ─── PostgreSQL (metadata: submissions, teams, benchmark runs) ───────
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: benchmarks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d benchmarks"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  # ─── TimescaleDB (telemetry time-series) ─────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: platform-timescaledb
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: telemetry
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./migrations/002_telemetry.sql:/docker-entrypoint-initdb.d/002_telemetry.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  # ─── Redis (leaderboard sorted sets + pub/sub) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform

  # ─── Redpanda (Kafka-compatible event streaming) ─────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    container_name: platform-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:19092"   # Kafka API (external)
      - "18082:18082"   # Pandaproxy (external)
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  # ─── Redpanda Console (Web UI for debugging) ────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.0
    container_name: platform-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    ports:
      - "8088:8080"
    volumes:
      - ./redpanda-console-config.yml:/tmp/config.yml
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - platform

  # ─── MinIO (S3-compatible object storage for submissions) ────────────
  minio:
    image: minio/minio:latest
    container_name: platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  # ─── MinIO bucket init ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: platform-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/submissions --ignore-existing;
      mc mb local/build-logs --ignore-existing;
      echo 'Buckets created successfully';
      "
    networks:
      - platform

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  redpanda_data:
  minio_data:

networks:
  platform:
    driver: bridge
