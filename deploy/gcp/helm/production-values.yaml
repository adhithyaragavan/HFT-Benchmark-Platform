# Production Overrides for IICPC Platform Helm Chart

global:
  imageRegistry: "us-central1-docker.pkg.dev/iicpc-summer-hackathn/iicpc-repo/"
  imagePullSecrets:
    - name: gcr-registry-secret

# ─── Database ────────────────────────────────────────────────────────
database:
  host: "postgres-svc.database.svc.cluster.local"
  port: 5432
  name: benchmarks
  user: platform
  passwordSecret: iicpc-db-credentials

timescaledb:
  host: "timescaledb-svc.database.svc.cluster.local"
  port: 5432
  name: telemetry
  user: platform

redis:
  host: "redis-svc.database.svc.cluster.local"
  port: 6379

redpanda:
  enabled: false
  host: "redpanda-svc.messaging.svc.cluster.local:9092"

minio:
  endpoint: "storage.googleapis.com"
  port: 443
  secure: true
  bucket: "iicpc-submissions-bucket"

# ─── Service Overrides (Scaled down to fit GCP Trial Quota) ──────────
submissionSvc:
  replicas: 1
  image:
    repository: platform/submission-svc
    tag: latest
  port: 8091
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

botOrchestrator:
  replicas: 1
  image:
    repository: platform/bot-orchestrator
    tag: latest
  port: 8092
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"

botWorker:
  replicas: 1
  image:
    repository: platform/bot-worker
    tag: latest
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"

scoringEngine:
  replicas: 1
  image:
    repository: platform/scoring-engine
    tag: latest
  port: 8094
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"

gateway:
  replicas: 1
  image:
    repository: platform/gateway
    tag: latest
  port: 8090
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"

leaderboardSvc:
  replicas: 1
  image:
    repository: platform/leaderboard-svc
    tag: latest
  port: 8093
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"

sandboxMgr:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"

contestant:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
