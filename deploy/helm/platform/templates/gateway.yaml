apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: platform
  labels:
    app: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: "{{ .Values.global.imageRegistry }}{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.gateway.port }}
          name: http
        env:
        - name: GATEWAY_PORT
          value: "{{ .Values.gateway.port }}"
        - name: DEV_MODE
          value: "true"
        - name: SUBMISSION_SVC_URL
          value: "http://submission-svc:8091"
        - name: LEADERBOARD_SVC_URL
          value: "http://leaderboard-svc:8093"
        - name: SCORING_ENGINE_URL
          value: "http://scoring-engine:8094"
        - name: ORCHESTRATOR_SVC_URL
          value: "http://bot-orchestrator:8092"
        resources:
          {{- toYaml .Values.gateway.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: platform
  labels:
    app: gateway
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.gateway.port }}
    targetPort: {{ .Values.gateway.port }}
    protocol: TCP
    name: http
  selector:
    app: gateway
